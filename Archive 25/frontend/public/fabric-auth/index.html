<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Authentication</title>
    <script src="msal-browser.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #0f172a; color: white; }
        .loader { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { font-size: 14px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status" id="status">Initializing Microsoft Login...</div>

    <script>
        const MSAL_CONFIG = {
            auth: {
                clientId: "f7ee975c-b651-4171-ae62-b913122575cb",
                authority: "https://login.microsoftonline.com/b8869792-ee44-4a05-a4fb-b6323a34ca35",
                redirectUri: window.location.origin + "/fabric-auth/index.html"
            },
            cache: { cacheLocation: "sessionStorage" }
        };

        const SCOPES = ["https://api.fabric.microsoft.com/.default"];
        let msalInstance;

        async function init() {
            try {
                msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
                await msalInstance.initialize();

                const response = await msalInstance.handleRedirectPromise();
                if (response) {
                    sendTokenBack(response.accessToken);
                    return;
                }

                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    try {
                        const silentReq = { scopes: SCOPES, account: accounts[0] };
                        const result = await msalInstance.acquireTokenSilent(silentReq);
                        sendTokenBack(result.accessToken);
                    } catch (e) {
                        login();
                    }
                } else {
                    login();
                }
            } catch (e) {
                document.getElementById('status').innerText = "Auth Error: " + e.message;
                console.error(e);
            }
        }

        async function login() {
            try {
                await msalInstance.loginRedirect({ scopes: SCOPES });
            } catch (e) {
                document.getElementById('status').innerText = "Login failed: " + e.message;
            }
        }

        function sendTokenBack(token) {
            document.getElementById('status').innerText = "Authentication successful! Closing...";
            if (window.opener) {
                window.opener.postMessage({
                    type: "FABRIC_TOKEN",
                    token: token
                }, "*");
                setTimeout(() => window.close(), 1000);
            } else {
                document.getElementById('status').innerText = "Success! You can close this window.";
            }
        }

        init();
    </script>
</body>
</html>
